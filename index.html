<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WebRefurb</title>
<meta name="description" content="Helping businesses improve their web presence.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100%;
  background: #FAFAF8;
}

body {
  min-height: 100vh;
  overflow: hidden;
  background:
    radial-gradient(circle at top, rgba(255, 255, 255, 0.96) 0%, rgba(250, 250, 248, 0.95) 42%, #FAFAF8 100%);
  color: #1A1A1A;
}

.topbar {
  position: fixed;
  top: 24px;
  right: 24px;
  z-index: 2;
}

.stage {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 44px 24px 24px;
}

.hero {
  width: 100%;
  max-width: 1160px;
  margin: 0 auto;
  padding: clamp(24px, 3.5vw, 38px) clamp(30px, 4vw, 48px);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: clamp(14px, 2vw, 24px);
  transform: translate(-8px, -52px);
}

.logo {
  display: block;
  width: min(16.15vw, 173px);
  min-width: 133px;
  height: auto;
  filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.04));
  flex-shrink: 0;
}

.copy {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  gap: 5px;
  min-width: 0;
}

.logo circle {
  opacity: 1;
  animation: dotFadeIn 1.8s ease-in-out forwards;
}

.logo circle:nth-of-type(1) { animation-delay: 0.00s; }
.logo circle:nth-of-type(2) { animation-delay: 0.04s; }
.logo circle:nth-of-type(3) { animation-delay: 0.08s; }
.logo circle:nth-of-type(4) { animation-delay: 0.12s; }
.logo circle:nth-of-type(5) { animation-delay: 0.16s; }
.logo circle:nth-of-type(6) { animation-delay: 0.20s; }
.logo circle:nth-of-type(7) { animation-delay: 0.24s; }
.logo circle:nth-of-type(8) { animation-delay: 0.28s; }
.logo circle:nth-of-type(9) { animation-delay: 0.32s; }
.logo circle:nth-of-type(10) { animation-delay: 0.36s; }
.logo circle:nth-of-type(11) { animation-delay: 0.40s; }
.logo circle:nth-of-type(12) { animation-delay: 0.44s; }
.logo circle:nth-of-type(13) { animation-delay: 0.48s; }
.logo circle:nth-of-type(14) { animation-delay: 0.52s; }
.logo circle:nth-of-type(15) { animation-delay: 0.56s; }
.logo circle:nth-of-type(16) { animation-delay: 0.60s; }

@keyframes dotFadeIn {
  0% { opacity: 0.6; }
  20% { opacity: 0.75; }
  45% { opacity: 0.68; }
  70% { opacity: 0.9; }
  100% { opacity: 1; }
}

.wordmark {
  display: block;
  font-size: clamp(38px, 4.5vw, 62px);
  font-weight: 700;
  letter-spacing: -0.055em;
  line-height: 0.92;
  color: #3B3B3B;
  opacity: 1;
  animation: fadeUp 0.6s ease forwards 0.75s;
}

.headline {
  display: block;
  font-size: clamp(18px, 1.95vw, 23px);
  font-weight: 600;
  letter-spacing: -0.035em;
  line-height: 1.08;
  color: #3B3B3B;
  max-width: 30ch;
  padding-left: 0.16em;
}

.headline-text {
  display: inline-block;
  white-space: nowrap;
}

@keyframes fadeUp {
  from {
    opacity: 0.85;
  }
  to {
    opacity: 1;
  }
}

.cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 28px;
  background: #1A1A1A;
  color: #FAFAF8;
  font-size: 15px;
  font-weight: 600;
  text-decoration: none;
  border-radius: 999px;
  transition: background 0.2s, transform 0.15s;
}

.cta:hover {
  background: #3B3B3B;
  transform: translateY(-1px);
}

.cta:active {
  transform: translateY(0);
}

.cta svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

@media (max-width: 640px) {
  .stage {
    padding: 84px 18px 24px;
  }

  .hero {
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 16px;
    padding: 28px 22px 30px;
    transform: none;
  }

  .logo {
    width: min(49vw, 201px);
    min-width: 0;
  }

  .copy {
    align-items: center;
  }

  .headline {
    max-width: 22ch;
    padding-left: 0;
  }
}

@media (prefers-reduced-motion: reduce) {
  .logo circle,
  .wordmark {
    animation: none;
    opacity: 1;
  }
}
</style>
</head>
<body>

<header class="topbar">
  <a class="cta" href="mailto:chris@webrefurb.com">
    Get in touch
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
      <polyline points="22,6 12,13 2,6"/>
    </svg>
  </a>
</header>

<main class="stage">
  <section class="hero" aria-label="WebRefurb">
<img class="logo" src="logo.svg" alt="" aria-hidden="true">

    <h1 class="copy">
      <span class="wordmark">WebRefurb</span>
      <span class="headline"><span class="headline-text">Helping businesses improve their web presence.</span></span>
    </h1>
  </section>
</main>

</body>
</html>
