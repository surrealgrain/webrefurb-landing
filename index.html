<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WebRefurb</title>
<meta name="description" content="Helping businesses improve their web presence.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

body {
  min-height: 100vh;
  overflow: hidden;
  background:
    radial-gradient(circle at top, rgba(255, 255, 255, 0.96) 0%, rgba(250, 250, 248, 0.95) 42%, #FAFAF8 100%);
  color: #1A1A1A;
}

.topbar {
  position: fixed;
  top: 24px;
  right: 24px;
  z-index: 2;
}

.stage {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 96px 24px 32px;
}

.hero {
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  padding: clamp(26px, 4vw, 42px) clamp(28px, 4vw, 48px);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: clamp(20px, 3vw, 36px);
  background: rgba(255, 255, 255, 0.32);
  border: 1px solid rgba(255, 255, 255, 0.55);
  border-radius: 34px;
  box-shadow: 0 24px 90px rgba(0, 0, 0, 0.025);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.logo {
  display: block;
  width: min(21vw, 260px);
  min-width: 190px;
  height: auto;
  filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.04));
  flex-shrink: 0;
}

.copy {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  gap: 10px;
  min-width: 0;
}

.logo circle {
  opacity: 1;
  animation: dotFadeIn 1.8s ease-in-out forwards;
}

.logo circle:nth-of-type(1) { animation-delay: 0.00s; }
.logo circle:nth-of-type(2) { animation-delay: 0.04s; }
.logo circle:nth-of-type(3) { animation-delay: 0.08s; }
.logo circle:nth-of-type(4) { animation-delay: 0.12s; }
.logo circle:nth-of-type(5) { animation-delay: 0.16s; }
.logo circle:nth-of-type(6) { animation-delay: 0.20s; }
.logo circle:nth-of-type(7) { animation-delay: 0.24s; }
.logo circle:nth-of-type(8) { animation-delay: 0.28s; }
.logo circle:nth-of-type(9) { animation-delay: 0.32s; }
.logo circle:nth-of-type(10) { animation-delay: 0.36s; }
.logo circle:nth-of-type(11) { animation-delay: 0.40s; }
.logo circle:nth-of-type(12) { animation-delay: 0.44s; }
.logo circle:nth-of-type(13) { animation-delay: 0.48s; }
.logo circle:nth-of-type(14) { animation-delay: 0.52s; }
.logo circle:nth-of-type(15) { animation-delay: 0.56s; }
.logo circle:nth-of-type(16) { animation-delay: 0.60s; }

@keyframes dotFadeIn {
  0% { opacity: 0.6; }
  20% { opacity: 0.75; }
  45% { opacity: 0.68; }
  70% { opacity: 0.9; }
  100% { opacity: 1; }
}

.wordmark {
  display: block;
  font-size: clamp(50px, 6vw, 86px);
  font-weight: 700;
  letter-spacing: -0.055em;
  line-height: 0.92;
  color: #3B3B3B;
  opacity: 1;
  animation: fadeUp 0.6s ease forwards 0.75s;
}

.headline {
  display: block;
  font-size: clamp(21px, 2.4vw, 30px);
  font-weight: 600;
  letter-spacing: -0.035em;
  line-height: 1.1;
  color: #3B3B3B;
  max-width: 24ch;
}

.headline-text {
  display: inline-block;
  white-space: nowrap;
}

@keyframes fadeUp {
  from {
    opacity: 0.85;
  }
  to {
    opacity: 1;
  }
}

.cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 28px;
  background: #1A1A1A;
  color: #FAFAF8;
  font-size: 15px;
  font-weight: 600;
  text-decoration: none;
  border-radius: 999px;
  transition: background 0.2s, transform 0.15s;
}

.cta:hover {
  background: #3B3B3B;
  transform: translateY(-1px);
}

.cta:active {
  transform: translateY(0);
}

.cta svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

@media (max-width: 640px) {
  .stage {
    padding: 84px 18px 24px;
  }

  .hero {
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 16px;
    padding: 28px 22px 30px;
  }

  .logo {
    width: min(64vw, 250px);
    min-width: 0;
  }

  .copy {
    align-items: center;
  }

  .headline {
    max-width: 22ch;
  }
}

@media (prefers-reduced-motion: reduce) {
  .logo circle,
  .wordmark {
    animation: none;
    opacity: 1;
  }
}
</style>
</head>
<body>

<header class="topbar">
  <a class="cta" href="mailto:chris@webrefurb.com">
    Get in touch
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
      <polyline points="22,6 12,13 2,6"/>
    </svg>
  </a>
</header>

<main class="stage">
  <section class="hero" aria-label="WebRefurb">
<svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-label="WebRefurb dots">
  <circle cx="11.071" cy="10.765" r="11.500" fill="#ffdc04"/>
  <circle cx="57.355" cy="10.680" r="11.000" fill="#f93c04"/>
  <circle cx="103.535" cy="10.671" r="11.000" fill="#04b3ec"/>
  <circle cx="149.585" cy="10.662" r="11.000" fill="#9ad700"/>
  <circle cx="11.140" cy="56.276" r="11.500" fill="#9dda03"/>
  <circle cx="149.704" cy="56.265" r="11.500" fill="#fedc01"/>
  <circle cx="57.359" cy="56.342" r="11.000" fill="#01b4ec"/>
  <circle cx="103.459" cy="56.353" r="11.000" fill="#fc3b02"/>
  <circle cx="11.088" cy="101.840" r="11.500" fill="#ffdd02"/>
  <circle cx="57.366" cy="101.693" r="11.000" fill="#fd3a02"/>
  <circle cx="103.540" cy="101.881" r="11.250" fill="#00b3eb"/>
  <circle cx="149.500" cy="101.897" r="11.250" fill="#98d700"/>
  <circle cx="149.755" cy="147.349" r="11.500" fill="#ffdd02"/>
  <circle cx="11.064" cy="147.474" r="11.250" fill="#9dda03"/>
  <circle cx="57.335" cy="147.500" r="11.000" fill="#04b4ed"/>
  <circle cx="103.522" cy="147.481" r="11.000" fill="#fb3d03"/>
</svg>

    <h1 class="copy">
      <span class="wordmark">WebRefurb</span>
      <span class="headline"><span class="headline-text">Helping businesses improve their web presence.</span></span>
    </h1>
  </section>
</main>

</body>
</html>
