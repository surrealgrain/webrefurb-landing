<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WebRefurb</title>
<meta name="description" content="Helping businesses improve their web presence.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #FAFAF8;
  --bg-gradient-top: rgba(255, 255, 255, 0.96);
  --bg-gradient-mid: rgba(250, 250, 248, 0.95);
  --text: #1A1A1A;
  --text-muted: #3B3B3B;
  --cta-bg: #1A1A1A;
  --cta-text: #FAFAF8;
  --cta-hover: #3B3B3B;
  --toggle-bg: transparent;
  --toggle-fill: #3B3B3B;
  --toggle-hover-bg: rgba(0, 0, 0, 0.06);
}

[data-theme="dark"] {
  --bg: #1A1A1A;
  --bg-gradient-top: rgba(26, 26, 26, 0.96);
  --bg-gradient-mid: rgba(26, 26, 26, 0.95);
  --text: #FAFAF8;
  --text-muted: #E0E0E0;
  --cta-bg: #FAFAF8;
  --cta-text: #1A1A1A;
  --cta-hover: #E0E0E0;
  --toggle-bg: transparent;
  --toggle-fill: #E0E0E0;
  --toggle-hover-bg: rgba(255, 255, 255, 0.08);
}

html {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100%;
  background: var(--bg);
  transition: background 0.3s ease;
}

body {
  min-height: 100vh;
  overflow: hidden;
  background:
    radial-gradient(circle at top, var(--bg-gradient-top) 0%, var(--bg-gradient-mid) 42%, var(--bg) 100%);
  color: var(--text);
  transition: background 0.3s ease, color 0.3s ease;
}

.topbar {
  position: fixed;
  top: 24px;
  right: 24px;
  z-index: 2;
  display: flex;
  align-items: center;
  gap: 12px;
}

.theme-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 40px;
  background: var(--toggle-bg);
  border: 1.5px solid var(--text-muted);
  border-radius: 999px;
  cursor: pointer;
  padding: 0;
  transition: background 0.2s, border-color 0.3s ease;
}

.theme-toggle:hover {
  background: var(--toggle-hover-bg);
}

.theme-toggle svg {
  width: 18px;
  height: 18px;
  fill: none;
  stroke: var(--toggle-fill);
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: stroke 0.3s ease;
}

.theme-toggle .icon-moon,
.theme-toggle .icon-sun { display: none; }

[data-theme="light"] .theme-toggle .icon-sun,
[data-theme="dark"] .theme-toggle .icon-moon { display: block; }

.stage {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 44px 24px 24px;
}

.hero {
  width: 100%;
  max-width: 1160px;
  margin: 0 auto;
  padding: clamp(24px, 3.5vw, 38px) clamp(30px, 4vw, 48px);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: clamp(14px, 2vw, 24px);
  transform: translate(-8px, -52px);
}

.logo {
  display: block;
  width: min(16.15vw, 173px);
  min-width: 133px;
  height: auto;
  filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.04));
  flex-shrink: 0;
}

.copy {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  gap: 5px;
  min-width: 0;
}

.logo circle {
  opacity: 1;
  animation: dotFadeIn 1.8s ease-in-out forwards;
}

.logo circle:nth-of-type(1) { animation-delay: 0.00s; }
.logo circle:nth-of-type(2) { animation-delay: 0.04s; }
.logo circle:nth-of-type(3) { animation-delay: 0.08s; }
.logo circle:nth-of-type(4) { animation-delay: 0.12s; }
.logo circle:nth-of-type(5) { animation-delay: 0.16s; }
.logo circle:nth-of-type(6) { animation-delay: 0.20s; }
.logo circle:nth-of-type(7) { animation-delay: 0.24s; }
.logo circle:nth-of-type(8) { animation-delay: 0.28s; }
.logo circle:nth-of-type(9) { animation-delay: 0.32s; }
.logo circle:nth-of-type(10) { animation-delay: 0.36s; }
.logo circle:nth-of-type(11) { animation-delay: 0.40s; }
.logo circle:nth-of-type(12) { animation-delay: 0.44s; }
.logo circle:nth-of-type(13) { animation-delay: 0.48s; }
.logo circle:nth-of-type(14) { animation-delay: 0.52s; }
.logo circle:nth-of-type(15) { animation-delay: 0.56s; }
.logo circle:nth-of-type(16) { animation-delay: 0.60s; }

@keyframes dotFadeIn {
  0% { opacity: 0.6; }
  20% { opacity: 0.75; }
  45% { opacity: 0.68; }
  70% { opacity: 0.9; }
  100% { opacity: 1; }
}

.wordmark {
  display: block;
  font-size: clamp(38px, 4.5vw, 62px);
  font-weight: 700;
  letter-spacing: -0.055em;
  line-height: 0.92;
  color: var(--text-muted);
  opacity: 1;
  animation: fadeUp 0.6s ease forwards 0.75s;
}

.headline {
  display: block;
  font-size: clamp(18px, 1.95vw, 23px);
  font-weight: 600;
  letter-spacing: -0.035em;
  line-height: 1.08;
  color: var(--text-muted);
  max-width: 30ch;
  padding-left: 0.16em;
}

.headline-text {
  display: inline-block;
  white-space: nowrap;
}

.mobile-break {
  display: none;
}

@keyframes fadeUp {
  from {
    opacity: 0.85;
  }
  to {
    opacity: 1;
  }
}

.cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 28px;
  background: var(--cta-bg);
  color: var(--cta-text);
  font-size: 15px;
  font-weight: 600;
  text-decoration: none;
  border-radius: 999px;
  transition: background 0.2s, transform 0.15s, color 0.3s ease;
}

.cta:hover {
  background: var(--cta-hover);
  transform: translateY(-1px);
}

.cta:active {
  transform: translateY(0);
}

.cta svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

@media (max-width: 768px) {
  html { overflow-y: auto; }
  
  body {
    overflow-y: auto;
    min-height: 100vh;
    min-height: 100dvh;
  }

  .stage {
    padding: 80px 16px 32px;
    min-height: auto;
  }

  .hero {
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 16px;
    padding: 0;
    transform: none;
    max-width: 100%;
  }

  .logo {
    width: min(48vw, 170px);
    min-width: 0;
    max-width: 170px;
    display: block;
    margin-left: auto;
    margin-right: auto;
  }

  .copy {
    align-items: center;
    gap: 6px;
    width: 100%;
  }

  .wordmark {
    font-size: clamp(28px, 9vw, 44px);
    text-align: center;
  }

  .headline {
    max-width: 100%;
    padding-left: 0;
    text-align: center;
    font-size: clamp(14px, 4vw, 17px);
    line-height: 1.35;
  }

  .headline-text {
    white-space: normal;
  }

  .mobile-break {
    display: inline;
  }

  .topbar {
    top: 12px;
    right: 12px;
  }

  .cta {
    padding: 10px 20px;
    font-size: 14px;
  }
}

@media (prefers-reduced-motion: reduce) {
  .logo circle,
  .wordmark {
    animation: none;
    opacity: 1;
  }
}
</style>
</head>
<body>

<header class="topbar">
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
    <svg class="icon-sun" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <svg class="icon-moon" viewBox="0 0 24 24">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>
  <a class="cta" href="mailto:chris@webrefurb.com">
    Get in touch
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
      <polyline points="22,6 12,13 2,6"/>
    </svg>
  </a>
</header>

<main class="stage">
  <section class="hero" aria-label="WebRefurb">
<img class="logo" src="logo.svg" alt="" aria-hidden="true">

    <h1 class="copy">
      <span class="wordmark">WebRefurb</span>
      <span class="headline">
        <span class="headline-text">Helping businesses improve <br class="mobile-break">their web presence.</span>
      </span>
    </h1>
  </section>
</main>

<script>
(function() {
  const html = document.documentElement;
  const stored = localStorage.getItem('theme');

  html.setAttribute('data-theme', stored === 'dark' ? 'dark' : 'light');

  document.getElementById('themeToggle').addEventListener('click', function() {
    const current = html.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  });
})();
</script>

</body>
</html>
