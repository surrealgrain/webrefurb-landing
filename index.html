<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WebRefurb</title>
<meta name="description" content="Helping businesses improve their web presence.">
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #FAFAF8;
  color: #1A1A1A;
  padding: 40px 24px 28px;
}

.logo {
  display: block;
  width: min(78vw, 760px);
  max-width: 760px;
  height: auto;
  margin-bottom: 28px;
  filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.04));
}

h1 {
  font-size: clamp(24px, 3vw, 34px);
  font-weight: 600;
  letter-spacing: -0.3px;
  color: #3B3B3B;
  margin-bottom: 34px;
  text-align: center;
  line-height: 1.3;
}

.cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 28px;
  background: #1A1A1A;
  color: #FAFAF8;
  font-size: 15px;
  font-weight: 600;
  text-decoration: none;
  border-radius: 999px;
  transition: background 0.2s, transform 0.15s;
}

.cta:hover {
  background: #3B3B3B;
  transform: translateY(-1px);
}

.cta:active {
  transform: translateY(0);
}

.cta svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

footer {
  position: fixed;
  bottom: 18px;
  font-size: 12px;
  color: #999;
}

@media (max-width: 640px) {
  body {
    padding-top: 28px;
  }

  .logo {
    width: min(88vw, 520px);
    margin-bottom: 24px;
  }

  h1 {
    margin-bottom: 28px;
  }
}
</style>
