<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WebRefurb</title>
<meta name="description" content="Helping businesses improve their web presence.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #FAFAF8;
  color: #1A1A1A;
  padding: 40px 24px 28px;
}

.logo {
  display: block;
  width: min(78vw, 760px);
  max-width: 760px;
  height: auto;
  margin-bottom: 28px;
  filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.04));
}

.logo circle {
  opacity: 0;
  animation: dotFadeIn 1.8s ease-in-out forwards;
}

.logo circle:nth-of-type(1) { animation-delay: 0.00s; }
.logo circle:nth-of-type(2) { animation-delay: 0.04s; }
.logo circle:nth-of-type(3) { animation-delay: 0.08s; }
.logo circle:nth-of-type(4) { animation-delay: 0.12s; }
.logo circle:nth-of-type(5) { animation-delay: 0.16s; }
.logo circle:nth-of-type(6) { animation-delay: 0.20s; }
.logo circle:nth-of-type(7) { animation-delay: 0.24s; }
.logo circle:nth-of-type(8) { animation-delay: 0.28s; }
.logo circle:nth-of-type(9) { animation-delay: 0.32s; }
.logo circle:nth-of-type(10) { animation-delay: 0.36s; }
.logo circle:nth-of-type(11) { animation-delay: 0.40s; }
.logo circle:nth-of-type(12) { animation-delay: 0.44s; }
.logo circle:nth-of-type(13) { animation-delay: 0.48s; }
.logo circle:nth-of-type(14) { animation-delay: 0.52s; }
.logo circle:nth-of-type(15) { animation-delay: 0.56s; }
.logo circle:nth-of-type(16) { animation-delay: 0.60s; }

@keyframes dotFadeIn {
  0% { opacity: 0; }
  20% { opacity: 0.35; }
  45% { opacity: 0.15; }
  70% { opacity: 0.75; }
  100% { opacity: 1; }
}

h1 {
  font-size: clamp(24px, 3vw, 34px);
  font-weight: 600;
  letter-spacing: -0.3px;
  color: #3B3B3B;
  margin-bottom: 34px;
  text-align: center;
  line-height: 1.3;
}

.headline {
  display: inline-block;
  white-space: nowrap;
  overflow: hidden;
  clip-path: inset(0 100% 0 0);
  animation: revealHeadline 1.1s linear 0.9s forwards;
}

@keyframes revealHeadline {
  from { clip-path: inset(0 100% 0 0); }
  to { clip-path: inset(0 0 0 0); }
}

.cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 28px;
  background: #1A1A1A;
  color: #FAFAF8;
  font-size: 15px;
  font-weight: 600;
  text-decoration: none;
  border-radius: 999px;
  transition: background 0.2s, transform 0.15s;
}

.cta:hover {
  background: #3B3B3B;
  transform: translateY(-1px);
}

.cta:active {
  transform: translateY(0);
}

.cta svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

footer {
  position: fixed;
  bottom: 18px;
  font-size: 12px;
  color: #999;
}

@media (max-width: 640px) {
  body {
    padding-top: 28px;
  }

  .logo {
    width: min(88vw, 520px);
    margin-bottom: 24px;
  }

  h1 {
    margin-bottom: 28px;
    font-size: clamp(20px, 5.5vw, 28px);
  }
}

@media (prefers-reduced-motion: reduce) {
  .logo circle,
  .headline {
    animation: none;
    opacity: 1;
  }

  .headline {
    clip-path: none;
  }
}
</style>
</head>
