<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ticket Machine Guide Print Master</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #FBF7EE;
  }
  .page {
    display: block;
    width: 100vw;
    height: auto;
    margin: 0;
    padding: 0;
  }
  img {
    display: block;
    width: 100%;
    height: auto;
    margin: 0;
    padding: 0;
  }
  @page {
    size: 8.5in 11in;
    margin: 0;
  }
  @media print {
    html, body {
      width: 8.5in;
      margin: 0;
      padding: 0;
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }
    .page {
      width: 8.5in;
      height: 11in;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    img {
      width: 8.5in;
      height: 11in;
    }
  }
</style>
</head>
<body>
<section class="page"><img src="ticket_machine_guide_editable_vector.svg" alt="Ticket Machine Guide"></section>
</body>
</html>
