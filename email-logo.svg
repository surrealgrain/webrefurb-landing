<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 306 56" width="306" height="56">
  <!--
    WebRefurb email logo — transparent background.
    Dot grid: 4 columns × 3 rows, matching webrefurb_logo.svg colour order.
    Wordmark: system-font stack, no embedded fonts required.
  -->

  <!-- Row 1 -->
  <circle cx="10"  cy="10" r="7" fill="#9ed70d"/>
  <circle cx="30"  cy="10" r="7" fill="#1cb8e8"/>
  <circle cx="50"  cy="10" r="7" fill="#f4a273"/>
  <circle cx="70"  cy="10" r="7" fill="#fcdb0c"/>

  <!-- Row 2 -->
  <circle cx="10"  cy="30" r="7" fill="#f4a273"/>
  <circle cx="30"  cy="30" r="7" fill="#fcdb0c"/>
  <circle cx="50"  cy="30" r="7" fill="#9ed70d"/>
  <circle cx="70"  cy="30" r="7" fill="#1cb8e8"/>

  <!-- Row 3 -->
  <circle cx="10"  cy="50" r="7" fill="#fcdb0c"/>
  <circle cx="30"  cy="50" r="7" fill="#f4a273"/>
  <circle cx="50"  cy="50" r="7" fill="#1cb8e8"/>
  <circle cx="70"  cy="50" r="7" fill="#9ed70d"/>

  <!-- Wordmark -->
  <text
    x="92" y="40"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="32"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#1A1A1A"
  >WebRefurb</text>
</svg>
